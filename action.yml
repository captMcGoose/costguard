name: "CostGuard"
description: "Analyze Terraform changes and comment estimated cloud cost impact on pull requests."
inputs:
  plan-file:
    description: "Path to Terraform plan JSON"
    required: true
    default: "plan.json"
runs:
  using: "composite"
  steps:
    - name: Build CostGuard CLI
      run: |
        go build -o costguard ./cmd/costguard
      shell: bash
    - name: Run CostGuard
      run: |
        ./costguard analyze "${{ inputs.plan-file }}"
      shell: bash
